name: CI

on:
  push:
    branches: [sandbox]
  pull_request:
    branches: [main, sandbox]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    name: CI / type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  lint:
    name: CI / lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    name: CI / build
    runs-on: ubuntu-latest
    needs: [type-check, lint]
    env:
      # Stub env vars so Next.js build doesn't fail in CI
      NEXTAUTH_SECRET: ci-secret-stub
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_URL: https://js17.dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  alias-sandbox:
    name: CI / alias sandbox.js17.dev
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/sandbox' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Alias latest sandbox deployment
        run: |
          DEPLOY_URL=$(vercel ls --token=${{ secrets.VERCEL_TOKEN }} | grep "Preview" | head -1 | awk '{print $2}')
          vercel alias "$DEPLOY_URL" sandbox.js17.dev --token=${{ secrets.VERCEL_TOKEN }} --scope=lordjnuxs-projects
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
